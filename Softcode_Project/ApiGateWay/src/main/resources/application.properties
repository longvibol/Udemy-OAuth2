server.port=8082

app.resourceserver.base-url=http://localhost:8081
app.photoserver.base-url=http://localhost:8090
app.albumserver.base-url=http://localhost:8091

# ===== WebMVC Gateway routes (NOT spring.cloud.gateway.routes) =====

spring.cloud.gateway.server.webmvc.routes[0].id=users-status-check
spring.cloud.gateway.server.webmvc.routes[0].uri=${app.resourceserver.base-url}
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/users/**
spring.cloud.gateway.server.webmvc.routes[0].predicates[1]=Method=GET
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=RemoveRequestHeader=Cookie

spring.cloud.gateway.server.webmvc.routes[1].id=photos
spring.cloud.gateway.server.webmvc.routes[1].uri=${app.photoserver.base-url}
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/photos/**
spring.cloud.gateway.server.webmvc.routes[1].predicates[1]=Method=GET
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=RemoveRequestHeader=Cookie

spring.cloud.gateway.server.webmvc.routes[2].id=albums
spring.cloud.gateway.server.webmvc.routes[2].uri=${app.albumserver.base-url}
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/albums/**
spring.cloud.gateway.server.webmvc.routes[2].predicates[1]=Method=GET
spring.cloud.gateway.server.webmvc.routes[2].filters[0]=RemoveRequestHeader=Cookie